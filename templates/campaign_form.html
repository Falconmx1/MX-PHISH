<!DOCTYPE html>
<html>
<head><title>Nueva campaña - MX-PHISH</title></head>
<body style="font-family: Arial; margin: 50px auto; width: 600px;">
    <h1>🚀 Crear nueva campaña</h1>
    <form method="POST">
        <label>Nombre de campaña:</label><br>
        <input type="text" name="name" required style="width: 100%; padding: 8px;"><br><br>
        
        <label>Asunto del correo:</label><br>
        <input type="text" name="subject" required style="width: 100%; padding: 8px;"><br><br>
        
        <label>Plantilla HTML (opcional):</label><br>
        <textarea name="template" rows="10" style="width: 100%;"></textarea><br><br>
        
        <button type="submit" style="background: #0052cc; color: white; padding: 10px 20px; border: none; border-radius: 5px;">Crear campaña</button>
    </form>
</body>
</html>
